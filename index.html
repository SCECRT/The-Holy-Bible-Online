<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Holy Bible Online</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #fcfbf9;
            color: #2c3e50;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: normal;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            background-color: #b8860b;
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem 2.5rem;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #966f0a;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>The Holy Bible Online</h1>
    
    <a href="KJV.html" class="btn">Read KJV Now!</a>
    <br>
    <a href="AKJV.html" class="btn">Read AKJV Now!</a>

</body>
</html>
